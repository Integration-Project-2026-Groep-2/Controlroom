name: ci
on:
  push:
    branches: ["main", "dev"]
  pull_request:
    branches: ["main", "dev"]

env:
  GO_VERSION: "1.24"

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Download modules
        run: go mod download
      - name: Verify modules
        run: go mod verify
      - name: Build controlroom
        run: go build -v ./cmd/controlroom/...
      - name: Build meta
        run: go build -v ./cmd/meta/...

  unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Run unit tests
        run: go test -v -race -count=1 ./tests/unit/...
