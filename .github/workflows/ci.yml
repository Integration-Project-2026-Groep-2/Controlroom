name: ci

on:
  push:
    branches: ["main", "dev"]
  pull_request:
    branches: ["main", "dev"]

env:
  GO_VERSION: "1.24"

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Download modules
        run: go mod download

      - name: Verify modules
        run: go mod verify

      - name: Build controlroom
        run: go build -v ./cmd/controlroom/...

      - name: Build meta
        run: go build -v ./cmd/meta/...

  unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run unit tests
        run: |
          go test -v -race -count=1 \
            ./tests/unit/... \
            ./tests/heartbeat_test/... \
            ./tests/user_test/... \
            ./pkg/...

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit

    services:
      rabbitmq:
        image: rabbitmq:3-management
        ports:
          - 5672:5672
          - 15672:15672
        env:
          RABBITMQ_DEFAULT_USER: guest
          RABBITMQ_DEFAULT_PASS: guest
        options: >-
          --health-cmd "rabbitmq-diagnostics -q ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

      elasticsearch:
        image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
        ports:
          - 9200:9200
        env:
          discovery.type: single-node
          # NOTE(nasr): would require generating a key, too much hassle
          xpack.security.enabled: "false"
          # NOTE(nasr): lower than what we use for prod
          ES_JAVA_OPTS: "-Xms512m -Xmx512m"
        options: >-
          --health-cmd "curl -sf http://localhost:9200/_cluster/health"
          --health-interval 15s
          --health-timeout 10s
          --health-retries 12

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Wait for services
        run: |
          echo "Waiting for RabbitMQ..."
          until curl -sf http://guest:guest@localhost:15672/api/overview; do sleep 2; done
          echo "Waiting for Elasticsearch..."
          until curl -sf http://localhost:9200/_cluster/health; do sleep 2; done

      - name: Run integration tests
        env:
          RABBITMQ_URL: amqp://guest:guest@localhost:5672/
          ELASTICSEARCH_URL: http://localhost:9200
        run: |
          go test -v -race -count=1 -timeout 120s \
            ./tests/integration/rabbitmq_test/... \
            ./tests/integration/elasticsearch_test/...

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: integration

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Start services via Compose
        run: |
          docker compose -f tests/unit/deployments_test/docker-compose.yml up -d
          echo "Waiting for stack to be healthy..."
          sleep 20

      - name: Run E2E tests
        env:
          RABBITMQ_URL: amqp://guest:guest@localhost:5672/
          ELASTICSEARCH_URL: http://localhost:9200
        run: |
          go test -v -race -count=1 -timeout 180s \
            ./tests/integration/e2e_test/...

      - name: Dump logs on failure
        if: failure()
        run: docker compose -f tests/unit/deployments_test/docker-compose.yml logs

      - name: Tear down Compose
        if: always()
        run: docker compose -f tests/unit/deployments_test/docker-compose.yml down -v
