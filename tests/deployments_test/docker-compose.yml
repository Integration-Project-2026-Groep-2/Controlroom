services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "${PORT_KIBANA}:5601"   # AMQP
      - "15672:15672"   # Management UI
    environment:
      - ${RABBITMQ_USER}
      - ${RABBITMQ_PASSWORD}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    restart: unless-stopped

volumes:
  rabbitmq_data: